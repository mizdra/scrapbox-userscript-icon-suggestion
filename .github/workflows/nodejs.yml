on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '16.x'
          cache: 'npm'

      - name: npm install
        run: npm install

      - name: npm run lint
        run: npm run lint

      - name: npm run build
        run: npm run build

      - name: npm run test
        run: npm run test
